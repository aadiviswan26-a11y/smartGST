<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Smart GST Calculator</title>

<link rel="stylesheet" href="/static/style.css" />

<style>
:root{
--navy-dark:#0f1e3f;
--navy-mid:#213a56;
--beige:#cdaa80;
--coffee:#997953;
--white:#ffffff;
--muted:#6b7280;
--radius-pill:36px;
--radius-card:14px;
--shadow:0 10px 30px rgba(15,23,42,0.06);
}

html,body{
height:100%;
margin:0;
font-family:Inter,"Segoe UI",Roboto,Arial,sans-serif;
background:#333333;
color:#ffffff;
}

.wrap{
max-width:980px;
margin:28px auto;
padding:20px;
}

.card{
background:var(--white);
border-radius:var(--radius-card);
box-shadow:var(--shadow);
padding:22px;
color:#111;
}

.flex-between{
display:flex;
justify-content:space-between;
align-items:center
}

h1{
margin:0 0 6px;
font-size:24px;
color:#00d4ff
}

.muted{
color:#cccccc;
font-size:13px
}

label{
display:block;
margin-top:12px;
color:#333;
font-weight:600
}

input[type=text],
input[type=number],
select,
textarea{
width:100%;
padding:12px;
border-radius:28px;
border:1px solid #e6e6e9;
margin-top:6px;
font-size:14px;
background:#fafafa;
}

.row{
display:flex;
gap:10px;
margin-top:12px
}

.row .col{
flex:1
}

/* ===== DRAMATIC DEEP BLUE BUTTONS ===== */

.btn{
display:inline-flex;
align-items:center;
justify-content:center;

position:relative;
border:none;
padding:12px 26px;
border-radius:40px;

font-weight:700;
font-size:14px;
letter-spacing:0.5px;

cursor:pointer;

color:white;
background:linear-gradient(135deg,#0a3d91,#001f54);

transition:all 0.25s ease;
overflow:hidden;

box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

/* shine animation */

.btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);
transition:0.6s;
}

.btn:hover::before{
left:100%;
}

/* hover lift */

.btn:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 12px 28px rgba(0,0,0,0.35);
}

.btn:active{
transform:translateY(1px) scale(0.97);
}

/* same deep blue for all button types */

.btn-green{background:linear-gradient(135deg,#0a3d91,#001f54);}
.btn-blue{background:linear-gradient(135deg,#0a3d91,#001f54);}
.btn-red{background:linear-gradient(135deg,#0a3d91,#001f54);}
.btn-orange{background:linear-gradient(135deg,#0a3d91,#001f54);}

.btn:active{transform:translateY(1px)}

.result{
background:#fff;
border-radius:12px;
padding:16px;
margin-top:16px;
border:1px solid #f1f1f1;
color:#111
}

#transcript{
margin-top:10px;
color:#444;
font-style:italic
}

#historyPanel{
margin-top:12px;
background:#fafafa;
padding:10px;
border-radius:8px;
max-height:260px;
overflow:auto;
border:1px solid #f1f1f1;
color:#222
}

.hint{
font-size:12px;
color:#7a7a7a;
margin-top:6px
}

@media (max-width:760px){
.row{flex-direction:column}
.flex-between{flex-direction:column;align-items:flex-start;gap:6px}
.btn-group{gap:8px;padding:0 5px;}
}

.profile-container{
position:relative;
}

.profile-pic{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
object-fit:cover;
border:2px solid #00d4ff;
}

.profile-popup{
display:none;
position:absolute;
top:50px;
right:0;
background:var(--white);
border-radius:var(--radius-card);
box-shadow:var(--shadow);
padding:10px;
min-width:120px;
z-index:1000;
}

.profile-popup a{
display:block;
padding:8px 12px;
color:#111;
text-decoration:none;
border-radius:4px;
}

.profile-popup a:hover{
background:#f0f0f0;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
<div style="text-align:center;">
<h1>Smart GST Calculator</h1>
<div class="muted">AI-assisted classification • invoice audit </div>
</div>

<div class="profile-container">
<img src="/static/profile_pics/{{ current_user.profile_pic or 'default.png' }}" alt="Profile" class="profile-pic" onclick="togglePopup()">
<div id="profile-popup" class="profile-popup">
<a href="/profile">Profile</a>
<a href="/logout">Logout</a>
</div>
</div>
</div>

<div id="itemsContainer">
<div class="item-row">
<div class="item-field product-field">
<label>Product / Service</label>
<input type="text" class="product-input" placeholder="e.g. packed basmati rice" autocomplete="off" />
</div>

<div class="item-field quantity-field">
<label>Quantity</label>
<input type="number" class="quantity-input" placeholder="1" min="1" value="1" />
</div>

<div class="item-field price-field">
<label>Unit Price (₹)</label>
<input type="text" class="price-input" placeholder="250" inputmode="decimal" />
</div>

<div class="item-field remove-field">
<button type="button" class="btn btn-red remove-item-btn" style="display: none;">×</button>
</div>
</div>
</div>

<div style="margin-top: 15px;">
<button type="button" id="addItemBtn" class="btn btn-blue">+ Add Another Item</button>
</div>

<div class="row" style="margin-top:12px">
<div class="col">
<label for="gstTypeSelect">GST Type</label>
<select id="gstTypeSelect">
<option value="exclusive">exclusive (add GST)</option>
<option value="inclusive">inclusive (price includes GST)</option>
</select>
</div>

<div class="col">
<label for="gstCategorySelect">GST Mode</label>
<select id="gstCategorySelect">
<option value="cgst_sgst">CGST + SGST (intra-state)</option>
<option value="igst">IGST (inter-state)</option>
</select>
</div>
</div>

<div class="btn-group" aria-label="primary actions">
<button id="calcBtn" class="btn btn-green">Calculate</button>
<button id="clearBtn" class="btn btn-red">Clear</button>
<button id="historyBtn" class="btn btn-blue">History</button>
</div>

<div class="btn-group" style="margin-top:12px">
<button id="invoiceBtn" class="btn btn-blue">Download Invoice (PDF)</button>
</div>

<label for="billedInput" style="margin-top:14px">Billed Amount from Shop (₹)</label>

<div style="display:flex; gap:10px; align-items:center; margin-top:6px;">
<input id="billedInput" type="number" step="0.01" placeholder="Enter billed total from invoice" style="flex:1;" />
<button id="checkFraudBtn" class="btn btn-blue">Check Fraud</button>
</div>

<div id="resultBox" class="result" aria-live="polite">
<p><strong>GST Rate:</strong> —</p>
<p><strong>GST Amount:</strong> —</p>
<p><strong>Total:</strong> —</p>
<p><strong>Category:</strong> —</p>
</div>

<div id="transcript" class="hint"></div>

<h3 style="margin-top:18px;color:#222">Billing History</h3>
<div id="historyPanel"><small>No history loaded yet — click History.</small></div>

</div>
</div>

<script>
function togglePopup(){
const popup=document.getElementById('profile-popup');
popup.style.display=popup.style.display==='block'?'none':'block';
}

document.addEventListener('click',function(event){
const container=document.querySelector('.profile-container');
const popup=document.getElementById('profile-popup');
if(!container.contains(event.target)){
popup.style.display='none';
}
});
</script>

</body>
</html>
